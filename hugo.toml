baseURL = "https://homeespressolab.com"
languageCode = "en-us"
title = "Home Espresso Lab"
theme = "PaperMod"

[params]
  description = "Your complete guide to home espresso. Expert brewing guides, honest equipment reviews, and barista techniques to help you make cafe-quality coffee at home."
  author = "Home Espresso Lab"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = true
  TocOpen = false
  defaultTheme = "light"
  env = "production"
  keywords = ["home espresso", "espresso guide", "home barista", "espresso machine", "coffee brewing"]

[params.homeInfoParams]
  Title = "Home Espresso Lab"
  Content = "Learn to brew cafe-quality espresso at home. Expert guides on technique, honest gear reviews, and recipes for every espresso drink."

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menus.main]]
  identifier = "guides"
  name = "Guides"
  url = "/guides/"
  weight = 10

[[menus.main]]
  identifier = "reviews"
  name = "Reviews"
  url = "/reviews/"
  weight = 20

[[menus.main]]
  identifier = "recipes"
  name = "Recipes"
  url = "/recipes/"
  weight = 30

[[menus.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup.goldmark.renderer]
  unsafe = true

[services.googleAnalytics]
  ID = "G-VMJCL1DJSY"
