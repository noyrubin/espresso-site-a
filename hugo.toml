baseURL = "https://espresso-site-a.vercel.app"
languageCode = "en-us"
title = "Home Espresso Guide"
theme = "PaperMod"

[params]
  description = "Your guide to home espresso, barista techniques, and coffee gear reviews"
  author = "Home Espresso Guide"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "light"
  
[params.homeInfoParams]
  Title = "Home Espresso Guide"
  Content = "Master home espresso — gear reviews, brewing guides, and barista tips."

[params.socialIcons]

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
[[menu.main]]
  identifier = "guides"
  name = "Guides"
  url = "/guides/"
  weight = 10
[[menu.main]]
  identifier = "reviews"
  name = "Reviews"
  url = "/reviews/"
  weight = 20
[[menu.main]]
  identifier = "recipes"
  name = "Recipes"
  url = "/recipes/"
  weight = 30

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup.goldmark.renderer]
  unsafe = true
