{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "author": {
    "@type": "Organization",
    "name": "Home Espresso Lab",
    "url": "https://homeespressolab.com"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Home Espresso Lab",
    "url": "https://homeespressolab.com"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  },
  "wordCount": {{ .WordCount }}
  {{- with .Params.tags }},
  "keywords": {{ . | jsonify }}
  {{- end }}
}
</script>
{{- with .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $qa := . }}
    {{- if $i }},{{ end }}
    {
      "@type": "Question",
      "name": {{ $qa.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ $qa.answer | jsonify }}
      }
    }
    {{- end }}
  ]
}
</script>
{{- end }}
{{- else if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Home Espresso Lab",
  "url": "https://homeespressolab.com",
  "description": {{ site.Params.description | jsonify }},
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://homeespressolab.com/search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{- end }}
